# Fly.io deployment config (alternative to Render)
# Deploy: `fly launch && fly deploy`
app = "nexus-sentinel-api"
primary_region = "gru"   # São Paulo

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  PORT = "8000"
